<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Arco-Íris Didática</title>
    <style>
        /* --- Estilos Globais e Layout --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            background-size: 400% 400%;
            animation: rainbow 15s infinite alternate;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes rainbow {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* --- Metade Esquerda: Calculadora --- */
        .calculator-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            border-right: 2px solid rgba(255,255,255,0.1);
        }

        .calculator {
            background: rgba(0, 0, 0, 0.85);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .display {
            background: black;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 26px;
            min-height: 65px;
            text-align: right;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            border: 1px solid #333;
        }

        .history-list {
            font-size: 12px;
            color: #ccc;
            min-height: 40px;
            max-height: 60px;
            text-align: right;
            margin-bottom: 5px;
            overflow-y: auto;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        button {
            padding: 15px 5px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        button:hover {
            background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet);
            color: black;
            transform: translateY(-2px);
        }

        .equal { background: linear-gradient(45deg, #00ff88, #00c853); }
        .clear { background: linear-gradient(45deg, #ff1744, #d50000); }
        .mode { background: linear-gradient(45deg, #ff9800, #ff5722); }

        /* --- Metade Direita: Caderno --- */
        .notebook-section {
            flex: 1;
            background-color: #e0e0e0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .notebook {
            width: 100%;
            height: 70%;
            max-width: 600px;
            background-color: #fdfdfd;
            border: 1px solid #ccc;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.2);
            position: relative;
            border-radius: 5px;
        }

        .notebook-paper {
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(#e5e5e5 1px, transparent 1px),
                linear-gradient(90deg, #e5e5e5 1px, transparent 1px);
            background-size: 25px 25px;
            position: absolute;
            top: 0; left: 0;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 5;
        }

        .explanation-box {
            width: 100%;
            max-width: 600px;
            margin-top: 15px;
            background: #2c2c3e;
            color: white;
            padding: 20px;
            border-radius: 12px;
            font-size: 15px;
            min-height: 90px;
            border-left: 5px solid #00ff88;
        }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow: auto; }
            .calculator-section, .notebook-section { flex: none; width: 100%; }
        }
    </style>
</head>
<body>

    <section class="calculator-section">
        <div class="calculator">
            <div class="history-list" id="history"></div>
            <div class="display" id="display">0</div>

            <div class="buttons">
                <button onclick="clearDisplay()" class="clear">C</button>
                <button onclick="backspace()">←</button>
                <button onclick="append('(')">(</button>
                <button onclick="append(')')">)</button>
                <button onclick="append('/')">÷</button>

                <button onclick="applyFunc('sin')">sin</button>
                <button onclick="applyFunc('cos')">cos</button>
                <button onclick="applyFunc('tan')">tan</button>
                <button onclick="applyFunc('log')">log</button>
                <button onclick="applyFunc('ln')">ln</button>

                <button onclick="append('7')">7</button>
                <button onclick="append('8')">8</button>
                <button onclick="append('9')">9</button>
                <button onclick="append('*')">×</button>
                <button onclick="applyFunc('sqrt')">√</button>

                <button onclick="append('4')">4</button>
                <button onclick="append('5')">5</button>
                <button onclick="append('6')">6</button>
                <button onclick="append('-')">−</button>
                <button onclick="append('**2')">x²</button>

                <button onclick="append('1')">1</button>
                <button onclick="append('2')">2</button>
                <button onclick="append('3')">3</button>
                <button onclick="append('+')">+</button>
                <button onclick="calculate()" class="equal">=</button>

                <button onclick="append('0')" style="grid-column: span 4;">0</button>
                <button class="mode" onclick="toggleMode()" id="modeBtn">RAD</button>
            </div>
        </div>
    </section>

    <section class="notebook-section">
        <div class="notebook">
            <div class="notebook-paper"></div>
            <canvas id="notebook-canvas"></canvas>
        </div>
        <div class="explanation-box" id="explanation">
            Professor: Aguardando sua conta para ensinar o passo a passo...
        </div>
    </section>

    <script>
        let display = document.getElementById("display");
        let historyDiv = document.getElementById("history");
        let explanation = document.getElementById("explanation");
        let isDegree = false;
        
        const canvas = document.getElementById('notebook-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
        }
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);

        function append(val) {
            if (display.innerText === "0") display.innerText = "";
            display.innerText += val;
        }

        function clearDisplay() {
            display.innerText = "0";
            historyDiv.innerHTML = "";
            explanation.innerText = "Professor: Limpei tudo! Vamos começar de novo?";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function backspace() {
            display.innerText = display.innerText.slice(0, -1) || "0";
        }

        function toggleMode() {
            isDegree = !isDegree;
            document.getElementById("modeBtn").innerText = isDegree ? "DEG" : "RAD";
        }

        function applyFunc(type) {
            try {
                let val = eval(display.innerText);
                let result;
                let rad = isDegree ? val * Math.PI / 180 : val;

                switch(type) {
                    case 'sin': result = Math.sin(rad); break;
                    case 'cos': result = Math.cos(rad); break;
                    case 'tan': result = Math.tan(rad); break;
                    case 'log': result = Math.log10(val); break;
                    case 'ln': result = Math.log(val); break;
                    case 'sqrt': result = Math.sqrt(val); break;
                }
                
                let label = `${type}(${val})`;
                historyDiv.innerHTML += `<div>${label} = ${result.toFixed(4)}</div>`;
                display.innerText = result;
                drawSciNote(label, result.toFixed(4));
            } catch {
                display.innerText = "Erro";
            }
        }

        function calculate() {
            try {
                let exp = display.innerText;
                let result = eval(exp);
                historyDiv.innerHTML += `<div>${exp} = ${result}</div>`;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Lógica de Professor
                if (exp.includes('+')) {
                    let parts = exp.split('+');
                    drawStepAddition(parseFloat(parts[0]), parseFloat(parts[1]), result);
                } else if (exp.includes('-')) {
                    let parts = exp.split('-');
                    drawStepSubtraction(parseFloat(parts[0]), parseFloat(parts[1]), result);
                } else if (exp.includes('*')) {
                    let parts = exp.split('*');
                    drawStepMultiplication(parseFloat(parts[0]), parseFloat(parts[1]), result);
                } else {
                    drawSciNote(exp, result);
                }

                display.innerText = result;
            } catch {
                display.innerText = "Erro";
            }
        }

        // --- FUNÇÕES DE DESENHO DO PROFESSOR ---

        function drawProfessorText(txt, x, y, size = "35px", color = "#333") {
            ctx.font = `bold ${size} 'Comic Sans MS', cursive`;
            ctx.fillStyle = color;
            ctx.fillText(txt, x, y);
        }

        function drawStepAddition(n1, n2, res) {
            let x = 150, y = 120;
            drawProfessorText(n1.toString().padStart(5, ' '), x, y);
            drawProfessorText("+ " + n2.toString().padStart(5, ' '), x - 45, y + 50);
            
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(x - 50, y + 65); ctx.lineTo(x + 150, y + 65); ctx.stroke();

            // Vai um visual
            if ((n1 % 10) + (n2 % 10) >= 10) {
                drawProfessorText("1", x + 60, y - 40, "20px", "red");
                explanation.innerText = "Professor: Somamos as unidades e 'subiu 1' para a dezena porque passou de 9!";
            } else {
                explanation.innerText = "Professor: Somamos as colunas alinhadas: unidade com unidade, dezena com dezena.";
            }

            drawProfessorText(res.toString(), x + 10, y + 110, "45px", "#27ae60");
        }

        function drawStepSubtraction(n1, n2, res) {
            let x = 150, y = 120;
            drawProfessorText(n1.toString(), x, y);
            drawProfessorText("- " + n2.toString(), x - 45, y + 50);
            ctx.beginPath(); ctx.moveTo(x - 50, y + 65); ctx.lineTo(x + 150, y + 65); ctx.stroke();
            drawProfessorText(res.toString(), x, y + 110, "45px", "#d50000");
            explanation.innerText = "Professor: Na subtração, tiramos o valor de baixo do de cima. Se faltar, pedimos emprestado ao vizinho!";
        }

        function drawStepMultiplication(n1, n2, res) {
            let x = 150, y = 100;
            drawProfessorText(n1.toString(), x, y);
            drawProfessorText("× " + n2.toString(), x - 45, y + 45);
            ctx.fillRect(x - 50, y + 55, 150, 3);

            if (n2 > 9) {
                let p1 = n1 * (n2 % 10);
                let p2 = n1 * (Math.floor(n2 / 10));
                drawProfessorText(p1.toString(), x, y + 95, "25px", "#666");
                drawProfessorText(p2.toString() + "0", x - 15, y + 130, "25px", "#666");
                ctx.fillRect(x - 50, y + 140, 150, 1);
                drawProfessorText(res.toString(), x, y + 190, "45px", "#2b6cb0");
                explanation.innerText = "Professor: Multiplicamos a unidade primeiro, depois a dezena e somamos tudo no final.";
            } else {
                drawProfessorText(res.toString(), x, y + 100, "45px", "#2b6cb0");
                explanation.innerText = "Professor: Multiplicamos cada número de cima pelo de baixo.";
            }
        }

        function drawSciNote(label, res) {
            drawProfessorText("Cálculo Realizado:", 50, 80, '18px', '#888');
            drawProfessorText(label + " =", 50, 140, '28px');
            drawProfessorText(res.toString(), 70, 210, '35px', '#27ae60');
            explanation.innerText = "Professor: Esse é um cálculo direto. O resultado está ali no caderno!";
        }

        // Atalhos de teclado
        document.addEventListener("keydown", (e) => {
            if (!isNaN(e.key) || "+-*/().".includes(e.key)) append(e.key);
            else if (e.key === "Enter") { e.preventDefault(); calculate(); }
            else if (e.key === "Backspace") backspace();
        });
    </script>
</body>
</html>
