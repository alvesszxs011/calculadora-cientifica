<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Didática - Estilo Caderno</title>
    <style>
        /* --- ESTILOS GERAIS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff);
            background-size: 400% 400%;
            animation: rainbow 15s infinite alternate;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes rainbow {
            0% { background-position: left; }
            100% { background-position: right; }
        }

        /* --- DIVISÃO DA TELA --- */
        .calculator-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            border-right: 2px solid rgba(255,255,255,0.1);
            padding: 20px;
        }

        .notebook-section {
            flex: 1;
            background-color: #e0e0e0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- CALCULADORA --- */
        .calculator {
            background: rgba(0, 0, 0, 0.85);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .display {
            background: black;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 26px;
            min-height: 65px;
            text-align: right;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            border: 1px solid #333;
            overflow-x: auto;
        }

        .history-list {
            font-size: 12px;
            color: #ccc;
            min-height: 40px;
            max-height: 60px;
            text-align: right;
            margin-bottom: 5px;
            overflow-y: auto;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        button {
            padding: 15px 5px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        button:hover {
            background: linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet);
            color: black;
            transform: translateY(-2px);
        }

        .equal { background: linear-gradient(45deg, #00ff88, #00c853); }
        .clear { background: linear-gradient(45deg, #ff1744, #d50000); }
        /* Estilo para botões científicos */
        .sci { background: rgba(0, 150, 255, 0.2); font-size: 12px; }

        /* --- CADERNO --- */
        .notebook {
            width: 100%;
            height: 70%;
            max-width: 600px;
            background-color: #fdfdfd;
            border: 1px solid #ccc;
            box-shadow: 10px 10px 25px rgba(0,0,0,0.2);
            position: relative;
            border-radius: 5px;
            overflow: hidden;
        }

        .notebook-paper {
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(#e5e5e5 1px, transparent 1px),
                linear-gradient(90deg, #e5e5e5 1px, transparent 1px);
            background-size: 25px 25px; /* Tamanho do Grid */
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 5;
            pointer-events: none;
        }

        .explanation-box {
            width: 100%;
            max-width: 600px;
            margin-top: 15px;
            background: #2c2c3e;
            color: white;
            padding: 20px;
            border-radius: 12px;
            font-size: 15px;
            min-height: 90px;
            border-left: 5px solid #00ff88;
        }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow: auto; }
            .calculator-section, .notebook-section { flex: none; width: 100%; }
        }
    </style>
</head>
<body>

    <section class="calculator-section">
        <div class="calculator">
            <div class="history-list" id="history"></div>
            <div class="display" id="display">0</div>

            <div class="buttons">
                <button onclick="appendFunc('Math.sin')" class="sci">sin</button>
                <button onclick="appendFunc('Math.cos')" class="sci">cos</button>
                <button onclick="appendFunc('Math.tan')" class="sci">tan</button>
                <button onclick="appendFunc('Math.log10')" class="sci">log</button>
                <button onclick="append('Math.PI')" class="sci">π</button>

                <button onclick="clearDisplay()" class="clear">C</button>
                <button onclick="backspace()">←</button>
                <button onclick="append('(')">(</button>
                <button onclick="append(')')">)</button>
                <button onclick="append('/')">÷</button>

                <button onclick="append('7')">7</button>
                <button onclick="append('8')">8</button>
                <button onclick="append('9')">9</button>
                <button onclick="append('*')">×</button>
                <button onclick="append('**0.5')">√</button>

                <button onclick="append('4')">4</button>
                <button onclick="append('5')">5</button>
                <button onclick="append('6')">6</button>
                <button onclick="append('-')">−</button>
                <button onclick="append('**2')">x²</button>

                <button onclick="append('1')">1</button>
                <button onclick="append('2')">2</button>
                <button onclick="append('3')">3</button>
                <button onclick="append('+')">+</button>
                <button onclick="calculate()" class="equal">=</button>

                <button onclick="append('0')" style="grid-column: span 4;">0</button>
                <button onclick="append('.')">.</button>
            </div>
        </div>
    </section>

    <section class="notebook-section">
        <div class="notebook">
            <div class="notebook-paper"></div>
            <canvas id="notebook-canvas"></canvas>
        </div>
        <div class="explanation-box" id="explanation">
            Professor: Aguardando sua conta para ensinar o passo a passo no grid...
        </div>
    </section>

    <script>
        const canvas = document.getElementById('notebook-canvas');
        const ctx = canvas.getContext('2d');
        const display = document.getElementById('display');
        const explanation = document.getElementById('explanation');
        const historyDiv = document.getElementById('history');

        const GRID = 25;

        function resizeCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
        }
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);

        function escreverNoGrid(texto, col, lin, cor = "#1a1a1a", tamanho = "20px") {
            ctx.font = `bold ${tamanho} 'Courier New', monospace`;
            ctx.fillStyle = cor;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            let str = texto.toString();
            for (let i = 0; i < str.length; i++) {
                let x = (col + i) * GRID + (GRID / 2);
                let y = lin * GRID + (GRID / 2);
                if (str[i] !== " ") {
                    ctx.fillText(str[i], x, y);
                }
            }
        }

        // Função para armar Soma e Subtração
        function desenharOperacaoSimples(n1, n2, res, operador) {
            let s1 = n1.toString();
            let s2 = n2.toString();
            let sRes = res.toString();
            let tam = Math.max(s1.length, s2.length, sRes.length) + 1;
            let c = 5, l = 3;

            escreverNoGrid(s1.padStart(tam, ' '), c, l);
            escreverNoGrid(s2.padStart(tam, ' '), c, l + 1);
            escreverNoGrid(operador, c, l + 1);

            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#000";
            ctx.moveTo(c * GRID, (l + 2) * GRID);
            ctx.lineTo((c + tam + 1) * GRID, (l + 2) * GRID);
            ctx.stroke();

            escreverNoGrid(sRes.padStart(tam, ' '), c, l + 2, "#27ae60", "22px");
        }

        function desenharMultiplicacao(n1, n2, res) {
            let s1 = n1.toString();
            let s2 = n2.toString();
            let sRes = res.toString();
            let tam = Math.max(s1.length, s2.length, sRes.length) + 1;
            let c = 5, l = 3;

            escreverNoGrid(s1.padStart(tam, ' '), c, l);
            escreverNoGrid(s2.padStart(tam, ' '), c, l + 1);
            escreverNoGrid("×", c, l + 1);

            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#000";
            ctx.moveTo(c * GRID, (l + 2) * GRID);
            ctx.lineTo((c + tam + 1) * GRID, (l + 2) * GRID);
            ctx.stroke();

            if (Number(n2) > 9 && Number.isInteger(Number(n1)) && Number.isInteger(Number(n2))) {
                let p1 = (n1 * (n2 % 10)).toString();
                let p2 = (n1 * Math.floor(n2 / 10)).toString();
                
                escreverNoGrid(p1.padStart(tam, ' '), c, l + 2, "#666");
                escreverNoGrid(p2.padStart(tam - 1, ' '), c, l + 3, "#666"); 
                escreverNoGrid("+", c, l + 3);

                ctx.beginPath();
                ctx.moveTo(c * GRID, (l + 4) * GRID);
                ctx.lineTo((c + tam + 1) * GRID, (l + 4) * GRID);
                ctx.stroke();

                escreverNoGrid(sRes.padStart(tam, ' '), c, l + 4, "#27ae60", "22px");
            } else {
                escreverNoGrid(sRes.padStart(tam, ' '), c, l + 2, "#27ae60", "22px");
            }
        }

        function desenharDivisao(n1, n2, res) {
            let q = res.toString();
            let s1 = n1.toString();
            let c = 4, l = 4;

            escreverNoGrid(s1, c, l);

            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#000";
            let chaveX = (c + s1.length) * GRID + 5;
            ctx.moveTo(chaveX, (l - 0.5) * GRID);
            ctx.lineTo(chaveX, (l + 1) * GRID); 
            ctx.lineTo(chaveX + (6 * GRID), (l + 1) * GRID); 
            ctx.stroke();

            escreverNoGrid(n2.toString(), c + s1.length + 1, l);
            escreverNoGrid(q, c + s1.length + 1, l + 1, "#27ae60");
            
            // Desenha o resto aproximado ou zero para didática
            let r = (Number(n1) % Number(n2)).toFixed(2);
            escreverNoGrid(parseFloat(r).toString(), c + s1.length - 1, l + 2, "#e53e3e", "14px");
        }

        function desenharFracao(exp) {
            let [num, den] = exp.split('/');
            let c = 8, l = 6;
            escreverNoGrid(num, c, l);
            ctx.fillStyle = "#000";
            ctx.fillRect(c * GRID + 5, (l + 1) * GRID - 2, GRID * num.length + 10, 2);
            escreverNoGrid(den, c, l + 1);
            explanation.innerText = "Professor: Note que uma divisão também é uma fração!";
        }

        function append(val) {
            if (display.innerText === "0") display.innerText = "";
            display.innerText += val;
        }

        function appendFunc(func) {
            if (display.innerText === "0") display.innerText = "";
            display.innerText += func + "(";
        }

        function clearDisplay() {
            display.innerText = "0";
            historyDiv.innerHTML = "";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            explanation.innerText = "Professor: Caderno limpo! Vamos começar de novo?";
        }

        function backspace() {
            display.innerText = display.innerText.slice(0, -1) || "0";
        }

        function calculate() {
            try {
                let exp = display.innerText;
                let cleanExp = exp.replace(/×/g, '*').replace(/÷/g, '/');
                let res = eval(cleanExp);
                
                // Formatação: permite qualquer resultado (inteiro ou decimal com 4 casas)
                let resFormatado = Number.isInteger(res) ? res : res.toFixed(4);
                resFormatado = parseFloat(resFormatado); // Remove zeros desnecessários no final

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                historyDiv.innerHTML += `<div>${exp} = ${resFormatado}</div>`;

                // Logica do Professor / Desenho no Caderno
                if (exp.includes('*') && !exp.includes('Math')) {
                    let parts = cleanExp.split('*');
                    desenharMultiplicacao(parts[0], parts[1], resFormatado);
                    explanation.innerText = `Professor: Para multiplicar ${parts[0]} por ${parts[1]}, alinhei os números e calculei o produto. Veja o resultado decimal no grid!`;
                } 
                else if (exp.includes('/') && !exp.includes('Math')) {
                    let parts = cleanExp.split('/');
                    if (parts[0].length > 2 || parts[1].length > 1) {
                        desenharDivisao(parts[0], parts[1], resFormatado);
                        explanation.innerText = `Professor: Montei a chave da divisão. Dividir ${parts[0]} por ${parts[1]} nos dá esse quociente exato ou decimal.`;
                    } else {
                        desenharFracao(exp);
                    }
                }
                else if (exp.includes('+') && !exp.includes('Math')) {
                    let parts = cleanExp.split('+');
                    desenharOperacaoSimples(parts[0], parts[1], resFormatado, "+");
                    explanation.innerText = `Professor: Armei a soma verticalmente. Somando as unidades e decimais, chegamos a ${resFormatado}.`;
                }
                else if (exp.includes('-') && !exp.includes('Math')) {
                    let parts = cleanExp.split('-');
                    desenharOperacaoSimples(parts[0], parts[1], resFormatado, "-");
                    explanation.innerText = `Professor: Coloquei o maior sobre o menor para subtrair. A diferença encontrada foi ${resFormatado}.`;
                }
                else {
                    if(exp.includes('Math')) {
                        explanation.innerText = "Professor: Essa é uma função avançada! Calculei o valor preciso e registrei aqui no seu caderno.";
                    } else {
                        explanation.innerText = "Professor: Pronto! Registrei o cálculo e o resultado final no papel.";
                    }
                    escreverNoGrid(`${exp} =`, 1, 3, "#333", "16px");
                    escreverNoGrid(resFormatado.toString(), 2, 5, "#27ae60", "26px");
                }

                display.innerText = resFormatado;
            } catch (e) {
                display.innerText = "Erro";
                explanation.innerText = "Professor: Opa, algo na sua expressão está confuso. Pode conferir?";
            }
        }

        document.addEventListener("keydown", (e) => {
            if (!isNaN(e.key) || "+-*/().".includes(e.key)) append(e.key);
            if (e.key === "Enter") calculate();
            if (e.key === "Backspace") backspace();
        });
    </script>
</body>
</html>
